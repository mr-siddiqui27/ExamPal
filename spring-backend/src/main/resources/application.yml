spring:
  application:
    name: exampal-backend
  config:
    import: optional:file:../config.env[.properties]
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/exampal}
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:5242880}
      max-request-size: ${MAX_FILE_SIZE:5242880}

server:
  port: ${PORT:5000}
  compression:
    enabled: true

exampal:
  auth-disabled: ${AUTH_DISABLED:false}
  jwt-secret: ${JWT_SECRET:your_super_secret_jwt_key_change_this_in_production}
  jwt-expires-in: ${JWT_EXPIRES_IN:30d}
  gemini-api-key: ${GEMINI_API_KEY:}
  gemini-model: ${GEMINI_MODEL:gemini-2.5-flash}
  gemini-max-tokens: ${GEMINI_MAX_TOKENS:8000}
  gemini-temperature: ${GEMINI_TEMPERATURE:0.7}
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5000}
  upload-path: ${UPLOAD_PATH:uploads/}
  rate-limit-window-ms: ${RATE_LIMIT_WINDOW_MS:900000}
  rate-limit-max-requests: ${RATE_LIMIT_MAX_REQUESTS:100}

logging:
  level:
    root: INFO
    com.exampal: DEBUG
